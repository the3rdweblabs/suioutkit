services:
  redis:
    image: redis:alpine
    container_name: suioutkit-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - suioutkit-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: suioutkit-backend
    ports:
      - "5000:5000"
    restart: always
    env_file:
      - backend/.env
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - suioutkit-net

volumes:
  redis_data:

networks:
  suioutkit-net:
    driver: bridge
