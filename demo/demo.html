<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuiOutKit SDK Demo</title>
  <link rel="stylesheet" href="http://localhost:5000/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top right, #1e1b4b 0%, #09090b 100%);
      color: #f3f4f6;
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      padding: 40px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(18px);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      color: #9ca3af;
      line-height: 1.6;
    }

    code {
      color: #a5b4fc;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 16px 22px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    #checkout-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.35);
    }

    #checkout-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #reload-btn {
      background: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
    }

    .status {
      margin-top: 22px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.22);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      min-height: 72px;
    }

    .ok {
      color: #34d399;
    }

    .err {
      color: #f87171;
    }
  </style>
</head>

<body>
  <main class="card">
    <span class="badge">SuiOutKit Demo</span>
    <h1>Trion Storefront</h1>
    <p>
      This page loads the SDK from the backend, creates a checkout session, and opens the live modal.
      Backend: <code>http://localhost:5000</code>
    </p>

    <div class="row">
      <button id="checkout-btn" disabled>Initializing SDK...</button>
      <button id="reload-btn">Retry backend check</button>
    </div>

    <div class="status" id="status">Waiting for backend health check...</div>
  </main>

  <script type="module">
    const BACKEND_URL = "http://localhost:5000";
    const MERCHANT_ADDRESS = "0x534e227f48fc630b92298948ee57b75db82e7388896f4eefe34e040494f61581";
    const SDK_URL = `${BACKEND_URL}/sdk/dist/index.js`;

    const statusEl = document.getElementById("status");
    const checkoutBtn = document.getElementById("checkout-btn");
    const reloadBtn = document.getElementById("reload-btn");

    async function backendReady() {
      try {
        const res = await fetch(`${BACKEND_URL}/health`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const body = await res.json();
        statusEl.textContent = `Backend ready: ${body.service}`;
        statusEl.className = "status ok";
        return true;
      } catch (err) {
        statusEl.textContent = `Backend not reachable: ${err.message}`;
        statusEl.className = "status err";
        return false;
      }
    }

    async function loadSdk() {
      try {
        const module = await import(SDK_URL);
        return module.SuiOutKit;
      } catch (err) {
        throw new Error(`Failed to load SDK: ${err.message}`);
      }
    }

    let sdk;

    async function init() {
      checkoutBtn.disabled = true;
      checkoutBtn.textContent = "Initializing SDK...";

      const online = await backendReady();
      if (!online) {
        checkoutBtn.textContent = "Backend offline";
        return;
      }

      try {
        const SuiOutKit = await loadSdk();
        sdk = new SuiOutKit({ merchantAddress: MERCHANT_ADDRESS });
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = "Pay ₦1000";
        statusEl.textContent = `SDK loaded from ${SDK_URL}\nMerchant: ${MERCHANT_ADDRESS}`;
        statusEl.className = "status ok";
      } catch (err) {
        checkoutBtn.textContent = "SDK load failed";
        statusEl.textContent = `SDK failed to load: ${err.message}`;
        statusEl.className = "status err";
      }
    }

    checkoutBtn.addEventListener("click", async () => {
      if (!sdk) return;
      checkoutBtn.disabled = true;
      try {
        statusEl.textContent = "Creating checkout session...";
        const session = await sdk.initCheckout({
          amount: 1000,
          currency: "NGN",
          metadata: { source: "demo.html", createdAt: new Date().toISOString() }
        });
        statusEl.textContent = `Session created: ${session.nonce}\nOpening modal...`;
        sdk.openModal(session, () => {
          checkoutBtn.disabled = false;
          statusEl.textContent = `Modal closed. Session nonce: ${session.nonce}`;
        });
      } catch (err) {
        checkoutBtn.disabled = false;
        statusEl.textContent = `Checkout failed: ${err.message}`;
        statusEl.className = "status err";
      }
    });

    reloadBtn.addEventListener("click", init);
    init();
  </script>
</body>

</html>
